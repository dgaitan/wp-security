name: CI

# Runs the full quality gate (lint -> analyse -> test) on every PR into main,
# and on pushes to main itself. Make this check "Required" in the repository's
# branch protection rules so a PR cannot be merged until it passes.
on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    name: composer check (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: [ '8.1', '8.2', '8.3' ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer:v2
          coverage: none

      - name: Install dependencies
        uses: ramsey/composer-install@v3

      - name: Run quality gate
        run: composer run check
