name: CI

# Runs the full quality gate (lint -> analyse -> test) on every PR into main,
# and on pushes to main itself. Make this check "Required" in the repository's
# branch protection rules so a PR cannot be merged until it passes.
on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main, develop ]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  php:
    name: PHP ${{ matrix.php }} / WP ${{ matrix.wp }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: [ '8.1', '8.2', '8.3' ]
        wp:  [ 'latest' ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer:v2
          extensions: mbstring, intl, dom, libxml
          coverage: none

      - name: Install dependencies
        uses: ramsey/composer-install@v3

      - name: Run quality gate (lint + analyse + test)
        run: composer run check

  js:
    name: JS build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Build assets
        run: npm run build

      - name: Lint JavaScript
        run: npm run lint:js
